version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tennishq
      POSTGRES_USER: tennishq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tennishq_dev_pw}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tennishq']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://tennishq:${POSTGRES_PASSWORD:-tennishq_dev_pw}@postgres:5432/tennishq
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
